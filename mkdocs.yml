site_name: Algo Prep — статьи

site_description: Теория и заметки по подготовке к собеседованию Frontend Developer

copyright: Copyright &copy; 2026



theme:

  name: material

  language: ru

  features:

    - navigation.sections

    - navigation.expand

    - navigation.top

    - search.suggest

    - search.highlight

    - content.code.copy

  palette:

    - media: "(prefers-color-scheme: light)"

      scheme: default

      primary: indigo

      accent: indigo

      toggle:

        icon: material/brightness-4

        name: Тёмная тема

    - media: "(prefers-color-scheme: dark)"

      scheme: slate

      primary: indigo

      accent: indigo

      toggle:

        icon: material/brightness-7

        name: Светлая тема



plugins:

  - search:

      lang:

        - ru

        - en



markdown_extensions:

  - admonition

  - pymdownx.details

  - pymdownx.superfences:

      custom_fences:

        - name: mermaid

          class: mermaid

          format: !!python/name:pymdownx.superfences.fence_code_format

  - pymdownx.highlight:

      anchor_linenums: true

  - tables

  - toc:

      permalink: true



nav:

  - Главная: index.md

  - Статьи:

      - articles/index.md

      - Алгоритмы:

          - articles/algorithms/index.md

          - Подсчёт сложности: articles/algorithms/complexity.md

          - Хеш-таблицы: articles/algorithms/hash-tables.md

          - Префиксные суммы: articles/algorithms/prefix-sum.md

          - Битовые манипуляции: articles/algorithms/bit-manipulation.md

          - Два указателя: articles/algorithms/two-pointers.md

          - Скользящее окно: articles/algorithms/sliding-window.md

          - Бинарный поиск: articles/algorithms/binary-search.md

          - Сортировки: articles/algorithms/sorting.md

          - Интервалы: articles/algorithms/intervals.md

          - Матрицы: articles/algorithms/matrices.md

          - Связные списки: articles/algorithms/linked-lists.md

          - Деревья: articles/algorithms/trees.md

          - Стеки и очереди: articles/algorithms/stacks-queues.md

          - Поиск с возвратом: articles/algorithms/backtracking.md

          - Графы: articles/algorithms/graphs.md

          - Динамическое программирование: articles/algorithms/dynamic-programming.md

      - Браузер:

          - articles/browser/index.md

          - Клик и переход на другую страницу: articles/browser/click-to-navigation.md

      - Интересные мини-задачи:

          - articles/mini-tasks/index.md

          - Каррирование и функция carried: articles/mini-tasks/currying-and-carried.md

          - compose: articles/mini-tasks/compose.md



extra:

  generator: false

