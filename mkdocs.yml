site_name: Algo Prep — статьи

site_description: Теория и заметки по подготовке к собеседованию Frontend Developer

copyright: Copyright &copy; 2026



theme:

  name: material

  language: ru

  features:

    - navigation.sections

    - navigation.expand

    - navigation.top

    - search.suggest

    - search.highlight

    - content.code.copy

  palette:

    - media: "(prefers-color-scheme: light)"

      scheme: default

      primary: indigo

      accent: indigo

      toggle:

        icon: material/brightness-4

        name: Тёмная тема

    - media: "(prefers-color-scheme: dark)"

      scheme: slate

      primary: indigo

      accent: indigo

      toggle:

        icon: material/brightness-7

        name: Светлая тема



plugins:

  - search:

      lang:

        - ru

        - en



markdown_extensions:

  - admonition

  - pymdownx.details

  - pymdownx.superfences:

      custom_fences:

        - name: mermaid

          class: mermaid

          format: !!python/name:pymdownx.superfences.fence_code_format

  - pymdownx.highlight:

      anchor_linenums: true

  - tables

  - toc:

      permalink: true



